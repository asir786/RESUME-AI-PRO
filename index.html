<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ResumeAI Pro - Free AI Resume Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fb;
    color:#222;
}

header{
    background:#0f172a;
    color:white;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    font-size:28px;
}

.hero{
    text-align:center;
    padding:60px 20px;
}

.hero h2{
    font-size:42px;
    margin-bottom:15px;
}

.hero p{
    font-size:18px;
    color:#555;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
}

.form-box,
.resume-box{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.form-box h3,
.resume-box h3{
    margin-bottom:20px;
    font-size:24px;
}

input,
textarea{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
}

textarea{
    resize:none;
    height:120px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:14px 20px;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1e40af;
}

.resume-preview{
    border:1px solid #ddd;
    padding:25px;
    border-radius:10px;
    background:#fff;
}

.resume-preview h1{
    color:#2563eb;
    margin-bottom:10px;
}

.resume-preview h2{
    margin-top:20px;
    font-size:20px;
    border-bottom:2px solid #2563eb;
    padding-bottom:5px;
}

.download-btn{
    margin-top:20px;
    width:100%;
}

footer{
    text-align:center;
    padding:30px;
    margin-top:50px;
    background:#0f172a;
    color:white;
}

@media(max-width:900px){
    .container{
        grid-template-columns:1fr;
    }

    .hero h2{
        font-size:30px;
    }
}
</style>
</head>
<body>

<header>
    <h1>ResumeAI Pro</h1>
    <p>Free AI Resume Builder</p>
</header>

<section class="hero">
    <h2>Create Professional AI Resumes in Seconds</h2>
    <p>Build ATS-friendly resumes for USA & Australia jobs.</p>
</section>

<div class="container">

    <!-- FORM -->
    <div class="form-box">
        <h3>Enter Your Details</h3>

        <input type="text" id="name" placeholder="Full Name">

        <input type="text" id="job" placeholder="Job Title">

        <textarea id="skills" placeholder="Skills (Example: HTML, CSS, Trading, Marketing)"></textarea>

        <textarea id="experience" placeholder="Work Experience"></textarea>

        <textarea id="education" placeholder="Education"></textarea>

        <button onclick="generateResume()">Generate Resume</button>
    </div>

    <!-- RESUME -->
    <div class="resume-box">
        <h3>Resume Preview</h3>

        <div class="resume-preview" id="resumeOutput">

            <h1>Your Name</h1>

            <p>Your professional summary will appear here.</p>

        </div>

        <button class="download-btn" onclick="downloadPDF()">Download PDF</button>
    </div>

</div>

<footer>
    © 2026 ResumeAI Pro - All Rights Reserved
</footer>

<!-- PDF Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
function generateResume(){

    let name = document.getElementById('name').value;
    let job = document.getElementById('job').value;
    let skills = document.getElementById('skills').value;
    let experience = document.getElementById('experience').value;
    let education = document.getElementById('education').value;

    let summary = `
        Highly motivated ${job} with strong experience in ${skills}.
        Passionate about delivering professional results and contributing
        to company growth with dedication and innovation.
    `;

    document.getElementById('resumeOutput').innerHTML = `
        <h1>${name}</h1>
        <p><strong>${job}</strong></p>

        <h2>Professional Summary</h2>
        <p>${summary}</p>

        <h2>Skills</h2>
        <p>${skills}</p>

        <h2>Experience</h2>
        <p>${experience}</p>

        <h2>Education</h2>
        <p>${education}</p>
    `;
}

function downloadPDF(){

    const element = document.getElementById('resumeOutput');

    html2pdf().from(element).save('resume.pdf');
}
</script>

</body>
</html>
